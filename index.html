<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIF 1.0 — Almost Correct</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{--paper:#f4f1ea;--ink:#111827;--muted:#6b7280;--blue:#1b3a6b;--red:#9b2c2c;--green:#1f7a4d;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;--serif:'Lora',serif}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#ede8dd;color:var(--ink);font-family:var(--sans)}
body{display:flex;align-items:center;justify-content:center;padding:28px}
.frame{width:min(1080px,100%);min-height:680px;background:radial-gradient(circle at var(--mx,68%) var(--my,24%),rgba(27,58,107,.10),transparent 30%),linear-gradient(135deg,#f8f5ee,#eee8dc);border:1px solid rgba(17,24,39,.12);box-shadow:0 28px 80px rgba(20,20,20,.16);position:relative;overflow:hidden;padding:56px clamp(28px,6vw,78px)}
.frame:before{content:"";position:absolute;inset:40px;border:1px solid rgba(27,58,107,.10);pointer-events:none}
.top{position:relative;z-index:2;display:flex;justify-content:space-between;gap:20px;margin-bottom:84px}
.kicker{font-family:var(--mono);font-size:13px;text-transform:uppercase;letter-spacing:.22em;color:var(--blue)}
.note{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.08em}
.main{position:relative;z-index:2;max-width:820px}
.line{font-size:clamp(34px,6vw,76px);line-height:1.05;letter-spacing:-.04em;font-weight:600}
.line.small{font-size:clamp(25px,4.2vw,50px);color:var(--muted);font-family:var(--serif);font-weight:400;font-style:italic;letter-spacing:-.025em}
.pause{height:32px}
.almost{display:inline-block;position:relative}
.almost:after{content:"";position:absolute;left:3px;right:-3px;bottom:.08em;height:2px;background:rgba(155,44,44,.35);transform-origin:left;animation:underline 5.8s ease-in-out infinite}
@keyframes underline{0%,22%{transform:scaleX(0);opacity:0}34%,72%{transform:scaleX(1);opacity:1}90%,100%{opacity:0}}
.word{display:inline-block;animation:softShift 5.8s ease-in-out infinite}
.word.two{animation-delay:.18s}
@keyframes softShift{0%,18%{transform:translateY(14px);opacity:0}28%,54%{transform:translateY(0);opacity:1}68%{transform:translateX(0)}76%{transform:translateX(7px)}86%,100%{transform:translateX(0);opacity:1}}
.measure{margin-top:72px;width:min(680px,100%);position:relative}
.track{height:2px;background:rgba(17,24,39,.15);position:relative}
.track:before,.track:after{content:"";position:absolute;top:-7px;width:2px;height:16px;background:rgba(17,24,39,.35)}
.track:before{left:0}.track:after{right:0}
.marker{position:absolute;top:-8px;left:0;width:18px;height:18px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 8px rgba(27,58,107,.08);animation:markerMove 5.8s ease-in-out infinite}
@keyframes markerMove{0%,20%{left:0;opacity:.2}36%{opacity:1}58%{left:76%;background:var(--green)}72%{left:92%;background:var(--green)}78%{left:89%;background:var(--red);box-shadow:0 0 0 12px rgba(155,44,44,.09)}100%{left:89%;opacity:.95;background:var(--red)}}
.labels{display:flex;justify-content:space-between;margin-top:14px;font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
.bottom{position:absolute;left:clamp(28px,6vw,78px);right:clamp(28px,6vw,78px);bottom:42px;display:flex;justify-content:space-between;gap:20px;align-items:flex-end;font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.12em;z-index:2}
.question{color:var(--blue);font-weight:600}
button{border:1px solid rgba(17,24,39,.18);background:transparent;color:var(--muted);padding:9px 15px;font-family:var(--mono);font-size:12px;cursor:pointer}
button:hover{color:var(--ink);border-color:rgba(17,24,39,.4)}
@media(max-width:760px){body{padding:0}.frame{min-height:100vh;border:none;padding:40px 24px}.top{margin-bottom:64px;flex-direction:column}.bottom{position:relative;left:auto;right:auto;bottom:auto;margin-top:72px;flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<section class="frame" id="frame">
  <div class="top">
    <div class="kicker">SIF 1.0 · why this exists</div>
    <div class="note">Layer 1–2 published · full pipeline follows</div>
  </div>

  <main class="main">
    <div class="line"><span class="word">Almost</span> <span class="word two">correct</span></div>
    <div class="pause"></div>
    <div class="line small">is not enough.</div>
    <div class="pause"></div>
    <div class="line" style="font-size:clamp(24px,3.5vw,42px);letter-spacing:-.025em;margin-top:28px">The question is not whether the text reads well.</div>
    <div class="line small" style="margin-top:18px">It is whether the <span class="almost">invariant</span> still passes.</div>

    <div class="measure">
      <div class="track"><div class="marker"></div></div>
      <div class="labels"><span>text</span><span>structure</span><span>decision</span></div>
    </div>
  </main>

  <div class="bottom">
    <div class="question">What survives translation?</div>
    <button onclick="location.reload()">replay</button>
  </div>
</section>

<script>
const frame=document.getElementById('frame');
document.addEventListener('mousemove',e=>{
  frame.style.setProperty('--mx',(e.clientX/window.innerWidth*100)+'%');
  frame.style.setProperty('--my',(e.clientY/window.innerHeight*100)+'%');
});
document.addEventListener('touchmove',e=>{
  if(!e.touches||!e.touches[0])return;
  const t=e.touches[0];
  frame.style.setProperty('--mx',(t.clientX/window.innerWidth*100)+'%');
  frame.style.setProperty('--my',(t.clientY/window.innerHeight*100)+'%');
},{passive:true});
</script>
</body>
</html>
